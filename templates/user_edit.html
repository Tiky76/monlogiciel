{% extends 'base.html' %}
{% block title %}Modifier {{ user.username }} — Billetterie{% endblock %}
{% block content %}<section class="card auth-card"><p><a href="{{ url_for('settings') }}">← Paramètres</a></p><h1>Modifier l'utilisateur</h1><form class="form-grid" method="post"><label>Identifiant<input name="username" value="{{ user.username }}" minlength="3" maxlength="80" required></label><label class="check-label"><input type="checkbox" name="is_admin" value="1" {% if user.is_admin %}checked{% endif %}> Administrateur</label><label class="check-label"><input type="checkbox" name="is_active" value="1" {% if user.is_active %}checked{% endif %}> Compte actif</label><label>Nouveau mot de passe <small>Laissez vide pour le conserver.</small><input type="password" name="new_password" minlength="8"></label><button class="button" type="submit">Enregistrer</button></form></section>{% endblock %}
