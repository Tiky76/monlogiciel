{% extends 'base.html' %}{% block title %}Modifier le trajet — Billetterie{% endblock %}{% block content %}<section class="card auth-card"><p><a href="{{ url_for('trips') }}">← Trajets</a></p><h1>Modifier le trajet</h1><p>{{ trip.origin }} → {{ trip.destination }}</p><form class="form-grid" method="post"><label>Date et heure<input type="datetime-local" name="departure_at" value="{{ trip.departure_at[:16] }}" required></label><label>Nombre de sièges<input type="number" name="seat_count" value="{{ trip.seat_count }}" min="1" required></label><p class="info-panel">Le trajet et son tarif restent inchangés pour protéger les réservations existantes.</p><button class="button">Enregistrer</button></form></section>{% endblock %}
